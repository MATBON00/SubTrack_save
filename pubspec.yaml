name: subtrack
description: Subscription tracker with payment reminders
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Pubblicità Google AdMob


  # Notifiche Local e Timezone
  flutter_local_notifications: ^17.0.0
  timezone: ^0.9.4

  # Database Locale (Hive)
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Gestione percorsi file
  path_provider: ^2.1.2

  # Formattazione date (necessario per il codice che abbiamo scritto)
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  
  # Generatori per Hive e Icone
  hive_generator: ^2.0.1
  build_runner: ^2.4.8
  flutter_launcher_icons: ^0.13.1

# ──────────────────────────────────────────────────────────
# CONFIGURAZIONE ICONE (Indipendente da flutter:)
# ──────────────────────────────────────────────────────────
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon.png"
  image_path_android: "assets/icon.png"
  image_path_ios: "assets/icon.png"
  adaptive_icon_background: "#0A0A0F"
  adaptive_icon_foreground: "assets/icon.png"

# ──────────────────────────────────────────────────────────
# CONFIGURAZIONE FLUTTER
# ──────────────────────────────────────────────────────────
flutter:
  uses-material-design: true

  # Definizione degli asset (assicurati che il file esista in quel percorso)
  assets:
    - assets/