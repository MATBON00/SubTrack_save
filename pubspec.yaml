name: subtrack
description: Subscription tracker with payment reminders
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # Notifiche
  flutter_local_notifications: ^17.0.0
  timezone: ^0.9.4
  # Database Locale (Hive)
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  # Generatori per Hive e Icone
  hive_generator: ^2.0.1
  build_runner: ^2.4.8
  flutter_launcher_icons: ^0.13.1

# Configurazione icone (fuori dal blocco flutter:)
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  # Ricordati di aggiungere la cartella assets se non l'hai fatto
  assets:
    - assets/icon/